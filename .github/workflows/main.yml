<!-- TOAST -->
<div class="toast" id="toast">✓ <span id="toastMsg"></span></div>

<script>
const products = [
  { id:1, name:'Wireless Earbuds Pro', category:'electronics', price:1999, oldPrice:3499, emoji:'🎧', rating:4.8, reviews:234, badge:'Hot' },
  { id:2, name:'Smart Watch Series X', category:'electronics', price:4999, oldPrice:7999, emoji:'⌚', rating:4.7, reviews:189, badge:'Sale' },
  { id:3, name:'4K Portable Speaker', category:'electronics', price:2499, oldPrice:null, emoji:'🔊', rating:4.5, reviews:92, badge:null },
  { id:4, name:'Fast Charge Power Bank', category:'electronics', price:1299, oldPrice:1999, emoji:'🔋', rating:4.6, reviews:310, badge:'Sale' },
  { id:5, name:'Classic Fit T-Shirt', category:'fashion', price:599, oldPrice:null, emoji:'👕', rating:4.3, reviews:78, badge:'New' },
  { id:6, name:'Premium Denim Jacket', category:'fashion', price:2299, oldPrice:3499, emoji:'🧥', rating:4.7, reviews:145, badge:'Sale' },
  { id:7, name:'Running Sneakers Air', category:'fashion', price:3499, oldPrice:null, emoji:'👟', rating:4.9, reviews:422, badge:'Hot' },
  { id:8, name:'Minimalist Desk Lamp', category:'home', price:999, oldPrice:1499, emoji:'💡', rating:4.4, reviews:56, badge:'Sale' },
  { id:9, name:'Premium Coffee Maker', category:'home', price:3999, oldPrice:null, emoji:'☕', rating:4.8, reviews:201, badge:'New' },
  { id:10, name:'Yoga Mat Pro', category:'sports', price:899, oldPrice:1299, emoji:'🧘', rating:4.6, reviews:167, badge:'Sale' },
  { id:11, name:'Protein Shaker Bottle', category:'sports', price:349, oldPrice:null, emoji:'🥤', rating:4.4, reviews:89, badge:null },
  { id:12, name:'Resistance Band Set', category:'sports', price:699, oldPrice:999, emoji:'💪', rating:4.7, reviews:134, badge:'Sale' },
];

let cart = [];
let currentFilter = 'all';

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let s = '★'.repeat(full);
  if(half) s += '½';
  return s;
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if (!list.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">No products found.</div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="product-card" onclick="viewProduct(${p.id})">
      <div class="product-img">
        ${p.badge ? `<span class="product-badge ${p.badge==='Sale'?'sale':''}">${p.badge}</span>` : ''}
        <span class="product-wishlist" onclick="event.stopPropagation(); wishlist(${p.id})">♡</span>
        ${p.emoji}
      </div>
      <div class="product-info">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-stars">${renderStars(p.rating)}<span>(${p.reviews})</span></div>
        <div class="product-bottom">
          <div class="product-price">
            ₹${p.price.toLocaleString()}
            ${p.oldPrice ? `<span class="old">₹${p.oldPrice.toLocaleString()}</span>` : ''}
          </div>
          <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${p.id})">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            Add
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterByCategory(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
  if(el) el.classList.add('active');
  const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
  renderProducts(filtered);
  document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
}

function filterProducts(query) {
  const q = query.toLowerCase();
  const filtered = products.filter(p =>
    (currentFilter === 'all' || p.category === currentFilter) &&
    (p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q))
  );
  renderProducts(filtered);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...product, qty: 1 });
  updateCartUI();
  showToast(`${product.emoji} ${product.name} added to cart!`);
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cartCount').textContent = total;
  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');

  if (!cart.length) {
    itemsEl.innerHTML = '<div class="cart-empty"><div class="empty-icon">🛒</div><p>Your cart is empty</p></div>';
    footerEl.style.display = 'none';
    return;
  }
  footerEl.style.display = 'block';
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cartTotal').textContent = '₹' + subtotal.toLocaleString();
  itemsEl.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div class="cart-item-img">${c.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price">₹${(c.price * c.qty).toLocaleString()}</div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty(${c.id}, -1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty(${c.id}, 1)">+</button>
        </div>
      </div>
      <button class="remove-item" onclick="removeFromCart(${c.id})">✕</button>
    </div>
  `).join('');
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function wishlist(id) {
  const p = products.find(x => x.id === id);
  showToast(`${p.emoji} ${p.name} added to wishlist!`);
}

function viewProduct(id) {
  const p = products.find(x => x.id === id);
  showToast(`Viewing ${p.name}`);
}

function checkout() {
  if (!cart.length) return;
  showToast('🎉 Order placed successfully! Thank you!');
  cart = [];
  updateCartUI();
  toggleCart();
}

function subscribeNewsletter() {
  showToast('🎉 You\'re subscribed! Welcome to ALL IN 1!');
}

function scrollToSection(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
}

// Init
renderProducts(products);
</script>
