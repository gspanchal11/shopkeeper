<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL IN 1 — Everything You Need</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #fafafa;
    --gray-50: #f5f5f5;
    --gray-100: #ebebeb;
    --gray-200: #d6d6d6;
    --gray-400: #a0a0a0;
    --gray-600: #5a5a5a;
    --accent: #e8ff47;
    --accent-dark: #c8e000;
    --red: #ff4444;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
    --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font-body);
    background: var(--white);
    color: var(--black);
    overflow-x: hidden;
  }

  /* ---- NAVBAR ---- */
  nav {
    position: sticky; top:0; z-index:100;
    background: rgba(250,250,250,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--gray-100);
    padding: 0 5%;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }

  .nav-logo {
    font-family: var(--font-head);
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--black);
    text-decoration: none;
  }
  .nav-logo span {
    background: var(--accent);
    padding: 2px 7px;
    border-radius: 6px;
    color: var(--black);
  }

  .nav-links {
    display: flex; gap: 2rem; list-style: none;
  }
  .nav-links a {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--gray-600);
    text-decoration: none;
    transition: var(--transition);
  }
  .nav-links a:hover { color: var(--black); }

  .nav-right {
    display: flex; align-items: center; gap: 1.2rem;
  }

  .search-bar {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--gray-50);
    border: 1px solid var(--gray-100);
    border-radius: 999px;
    padding: 7px 16px;
    width: 200px;
    transition: var(--transition);
  }
  .search-bar:focus-within {
    border-color: var(--black);
    width: 240px;
  }
  .search-bar input {
    border: none; background: transparent;
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--black);
    outline: none; width: 100%;
  }
  .search-bar svg { flex-shrink:0; color: var(--gray-400); }

  .cart-btn {
    position: relative;
    background: var(--black);
    color: var(--white);
    border: none; cursor: pointer;
    border-radius: 999px;
    padding: 9px 20px;
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    display: flex; align-items: center; gap: 0.5rem;
    transition: var(--transition);
  }
  .cart-btn:hover { background: #222; transform: translateY(-1px); }
  .cart-count {
    background: var(--accent);
    color: var(--black);
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 1px 6px;
    min-width: 18px;
    text-align: center;
  }

  /* ---- HERO ---- */
  .hero {
    padding: 80px 5% 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    min-height: 520px;
    background: var(--black);
    color: var(--white);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content:'';
    position:absolute; top:-100px; right:-100px;
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(232,255,71,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(232,255,71,0.15);
    border: 1px solid rgba(232,255,71,0.3);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    width: fit-content;
    animation: fadeUp 0.6s ease both;
  }

  .hero h1 {
    font-family: var(--font-head);
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 1.2rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero p {
    font-size: 1rem;
    color: rgba(250,250,250,0.6);
    line-height: 1.7;
    max-width: 420px;
    margin-bottom: 2rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-cta {
    display: flex; gap: 1rem; flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--black);
    border: none; cursor: pointer;
    padding: 14px 28px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); }

  .btn-outline {
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    padding: 14px 28px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 500;
    transition: var(--transition);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.6); transform: translateY(-2px); }

  .hero-visual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    transition: var(--transition);
    cursor: default;
  }
  .hero-card:hover {
    background: rgba(232,255,71,0.08);
    border-color: rgba(232,255,71,0.3);
    transform: translateY(-4px);
  }
  .hero-card .icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
  .hero-card p { font-size: 0.82rem; color: rgba(255,255,255,0.6); }
  .hero-card strong { display:block; font-size: 0.95rem; color: var(--white); margin-bottom: 0.2rem; }

  /* ---- MARQUEE ---- */
  .marquee-wrapper {
    background: var(--accent);
    overflow: hidden;
    padding: 12px 0;
    border-top: 1px solid var(--accent-dark);
  }
  .marquee-track {
    display: flex; gap: 3rem;
    animation: marquee 18s linear infinite;
    width: max-content;
  }
  .marquee-track span {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    white-space: nowrap;
  }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ---- SECTION HEADER ---- */
  .section { padding: 70px 5%; }
  .section-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 0.5rem;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .see-all {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--black);
    text-decoration: none;
    border-bottom: 1px solid var(--black);
    padding-bottom: 1px;
    transition: var(--transition);
    cursor: pointer;
  }
  .see-all:hover { color: var(--gray-600); border-color: var(--gray-400); }

  /* ---- CATEGORIES ---- */
  .categories-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
  }
  .cat-card {
    background: var(--gray-50);
    border-radius: var(--radius);
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    border: 2px solid transparent;
  }
  .cat-card:hover, .cat-card.active {
    background: var(--black);
    color: var(--white);
    transform: translateY(-4px);
    border-color: var(--black);
  }
  .cat-card .cat-icon { font-size: 2rem; margin-bottom: 0.7rem; }
  .cat-card .cat-name {
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 700;
  }
  .cat-card .cat-count { font-size: 0.75rem; color: var(--gray-400); margin-top: 0.2rem; }
  .cat-card:hover .cat-count, .cat-card.active .cat-count { color: rgba(255,255,255,0.5); }

  /* ---- PRODUCTS ---- */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }

  .product-card {
    background: var(--white);
    border: 1px solid var(--gray-100);
    border-radius: var(--radius);
    overflow: hidden;
    transition: var(--transition);
    cursor: pointer;
  }
  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    border-color: transparent;
  }

  .product-img {
    aspect-ratio: 1;
    background: var(--gray-50);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
  }
  .product-card:hover .product-img { background: var(--gray-100); }

  .product-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--accent);
    color: var(--black);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .product-badge.sale { background: var(--red); color: white; }

  .product-wishlist {
    position: absolute; top: 12px; right: 12px;
    background: white;
    border: 1px solid var(--gray-100);
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    cursor: pointer;
    opacity: 0;
    transition: var(--transition);
  }
  .product-card:hover .product-wishlist { opacity: 1; }
  .product-wishlist:hover { background: var(--gray-50); }

  .product-info { padding: 1rem 1.2rem 1.2rem; }
  .product-cat {
    font-size: 0.72rem;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.3rem;
  }
  .product-name {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .product-stars { font-size: 0.75rem; color: #f5a623; margin-bottom: 0.7rem; }
  .product-stars span { color: var(--gray-400); margin-left: 4px; }
  .product-bottom {
    display: flex; align-items: center; justify-content: space-between;
  }
  .product-price {
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 800;
  }
  .product-price .old {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--gray-400);
    text-decoration: line-through;
    margin-left: 6px;
  }
  .add-to-cart {
    background: var(--black);
    color: var(--white);
    border: none; cursor: pointer;
    border-radius: 999px;
    padding: 8px 16px;
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 600;
    transition: var(--transition);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .add-to-cart:hover { background: #333; transform: scale(1.04); }

  /* ---- PROMO BANNER ---- */
  .promo-section {
    padding: 0 5% 70px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.5rem;
  }
  .promo-card {
    border-radius: 16px;
    padding: 3rem;
    display: flex; flex-direction: column; justify-content: flex-end;
    min-height: 260px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: var(--transition);
  }
  .promo-card:hover { transform: scale(1.01); }
  .promo-main {
    background: var(--black);
    color: var(--white);
  }
  .promo-side {
    background: var(--accent);
    color: var(--black);
  }
  .promo-main::before {
    content:'';
    position:absolute; top:-50px; right:-50px;
    width:300px; height:300px;
    background: radial-gradient(circle, rgba(232,255,71,0.2) 0%, transparent 70%);
  }
  .promo-card .promo-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.5rem;
  }
  .promo-card h3 {
    font-family: var(--font-head);
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  .promo-side h3 { font-size: 1.5rem; }
  .promo-big { font-size: 5rem; font-weight: 800; position: absolute; right: 2rem; bottom: 1.5rem; opacity: 0.08; font-family: var(--font-head); }
  .promo-side .promo-big { opacity: 0.15; }

  /* ---- FEATURES ---- */
  .features-section {
    background: var(--gray-50);
    padding: 60px 5%;
  }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
  }
  .feature-item {
    display: flex; flex-direction: column; gap: 0.8rem;
  }
  .feature-icon {
    width: 48px; height: 48px;
    background: var(--black);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }
  .feature-item h4 {
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 700;
  }
  .feature-item p {
    font-size: 0.85rem;
    color: var(--gray-600);
    line-height: 1.6;
  }

  /* ---- TESTIMONIALS ---- */
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  .testi-card {
    background: var(--gray-50);
    border-radius: var(--radius);
    padding: 1.8rem;
    transition: var(--transition);
  }
  .testi-card:hover { background: var(--black); color: var(--white); transform: translateY(-4px); }
  .testi-stars { font-size: 0.85rem; color: #f5a623; margin-bottom: 1rem; }
  .testi-text { font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.2rem; color: var(--gray-600); }
  .testi-card:hover .testi-text { color: rgba(255,255,255,0.7); }
  .testi-author { display: flex; align-items: center; gap: 0.8rem; }
  .testi-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .testi-card:hover .testi-avatar { background: rgba(255,255,255,0.15); }
  .testi-author strong { font-size: 0.85rem; font-weight: 600; display: block; }
  .testi-author span { font-size: 0.75rem; color: var(--gray-400); }
  .testi-card:hover .testi-author span { color: rgba(255,255,255,0.4); }

  /* ---- NEWSLETTER ---- */
  .newsletter {
    background: var(--black);
    color: var(--white);
    padding: 70px 5%;
    text-align: center;
  }
  .newsletter h2 {
    font-family: var(--font-head);
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 0.8rem;
  }
  .newsletter h2 em { font-style: normal; color: var(--accent); }
  .newsletter p { color: rgba(255,255,255,0.5); margin-bottom: 2rem; }
  .newsletter-form {
    display: flex; gap: 0.8rem; max-width: 440px; margin: 0 auto;
  }
  .newsletter-form input {
    flex:1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 12px 18px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    outline: none;
    transition: var(--transition);
  }
  .newsletter-form input:focus { border-color: var(--accent); }
  .newsletter-form input::placeholder { color: rgba(255,255,255,0.35); }

  /* ---- FOOTER ---- */
  footer {
    background: var(--black);
    color: rgba(255,255,255,0.5);
    padding: 50px 5% 30px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 3rem;
    margin-bottom: 3rem;
  }
  .footer-brand .nav-logo { color: white; font-size: 1.3rem; }
  .footer-brand p { font-size: 0.85rem; line-height: 1.7; margin-top: 1rem; }
  .footer-col h5 {
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
    margin-bottom: 1.2rem;
    letter-spacing: 0.03em;
  }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
  .footer-col ul a { color: rgba(255,255,255,0.45); font-size: 0.84rem; text-decoration: none; transition: var(--transition); }
  .footer-col ul a:hover { color: white; }
  .footer-bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 0.8rem;
  }

  /* ---- CART SIDEBAR ---- */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-sidebar {
    position: fixed; top:0; right:0; bottom:0; z-index:1000;
    width: 400px;
    background: var(--white);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .cart-sidebar.open { transform: translateX(0); }

  .cart-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--gray-100);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h3 {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 800;
  }
  .cart-close {
    background: var(--gray-100); border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: var(--transition);
  }
  .cart-close:hover { background: var(--gray-200); }

  .cart-items { flex:1; overflow-y:auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .cart-empty { text-align: center; padding: 4rem 2rem; color: var(--gray-400); }
  .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

  .cart-item {
    display: flex; gap: 1rem; align-items: center;
    background: var(--gray-50);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .cart-item-img {
    width: 56px; height: 56px;
    background: var(--gray-100);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .cart-item-info { flex:1; }
  .cart-item-name { font-weight: 600; font-size: 0.88rem; margin-bottom: 0.3rem; }
  .cart-item-price { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; }
  .cart-item-controls { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .qty-btn {
    background: var(--white); border: 1px solid var(--gray-200);
    width: 24px; height: 24px; border-radius: 6px;
    cursor: pointer; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .qty-btn:hover { background: var(--black); color: white; border-color: var(--black); }
  .qty-num { font-size: 0.85rem; font-weight: 600; min-width: 20px; text-align: center; }
  .remove-item { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 1rem; margin-left: auto; transition: var(--transition); }
  .remove-item:hover { color: var(--red); }

  .cart-footer {
    padding: 1.5rem;
    border-top: 1px solid var(--gray-100);
  }
  .cart-total {
    display: flex; justify-content: space-between;
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 1rem;
  }
  .checkout-btn {
    width: 100%;
    background: var(--black);
    color: white;
    border: none; cursor: pointer;
    padding: 15px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
  }
  .checkout-btn:hover { background: #333; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--black);
    color: white;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 500;
    z-index: 2000;
    display: flex; align-items: center; gap: 0.6rem;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 1024px) {
    .products-grid { grid-template-columns: repeat(3, 1fr); }
    .categories-grid { grid-template-columns: repeat(3, 1fr); }
    .features-grid { grid-template-columns: repeat(2, 1fr); }
    .footer-grid { grid-template-columns: 1fr 1fr; }
